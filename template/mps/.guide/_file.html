		i,

		.topmenu {
			span {

				margin-left: 10px;
			}

			li {
				display: flex;

				~li {
					border-top: 1px solid #ddd;
				}
			}

			.type {
				display: block;
				border: 1px solid #111;

				>a {
					font-weight: bold;
					font-size: 14px;
					text-align: center;
					display: block;
					background-color: #889;
					color: #fff;
					/*&::after { content: "\ea4e"; font-family: 'remixicon'; display: inline-block; font-weight: normal; }*/
				}

				&.active {
					.depth1 {
						display: block;
					}

					/*>a::after { transform: rotate(180deg); }*/
				}
			}

			.depth1 {
				display: none;
				background-color: #f1f1f5;

				>li>a {
					font-weight: bold;

					+.depth2 {
						background-color: #fff;
					}
				}
			}

			.depth2>li>a {
				background: #f9f9fc;
			}

			.depth1>li>a+.depth2,
			.depth2>li>a+.depth3,
			.depth3>li>a+.depth4 {
				flex: 1 1 80%;
				max-width: 80%;
				border-left: 1px solid #eee;
				font-size: 11px;
			}

			.depth1>li>a,
			.depth2>li>a,
			.depth3>li>a {
				flex: 1 1 auto;
			}
		}

		.go-top {
			border-radius: 50%;
			width: 7.5rem;
			height: 7.5rem;
			min-width: 7.5rem;
			background-color: #555;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			color: #fff;
			border: 1px solid #555;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			line-height: normal;
			position: sticky;
			left: calc(100% - 12rem);
			bottom: 7.5rem;
			transform: translateY(50%);
			z-index: 10;
			opacity: 0;
			visibility: hidden;
			transition: 0.3s;

			span {
				font-weight: bold;
			}

			i {
				font-size: 2rem;
				background: none;
				color: #fff;
				margin: 0;
				padding: 0;
			}

			&:hover {
				transition: 0.2s;
			}

			&.fixed {
				opacity: 1;
				visibility: visible;
			}
		}

		@media screen and (max-width:767px) {
			body {
				padding: 10px;
			}

			.topmenu a {
				display: block;
			}

			.topmenu a+ul {
				max-width: 100% !important;
			}

			.topmenu li {
				display: block;
			}

			.topmenu .depth3 {
				border-top: 1px solid #f6f6f6;
			}

			.topmenu .depth3 li {
				margin-left: 15px;
			}
		}
