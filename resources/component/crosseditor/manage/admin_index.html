	function addEvent(elm, pe_mw, fn) {
		if (elm.addEventListener) {
			elm.addEventListener(pe_mw, fn, false);
		} else if (elm.attachEvent) {
			elm.attachEvent('on' + pe_mw, fn);
		} else {
			elm['on' + pe_mw] = fn;
		}
	}
